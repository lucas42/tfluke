services:
  app:
    build: .
    container_name: tfluke
    ports: 
      - $PORT:$PORT
    environment:
      - TFL_KEY
      - PORT
    image: lucas42/tfluke
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:$PORT/_info"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s